<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Audio in Loop</title>
</head>
<body>

 <audio id="player" loop>

    <source src="audio.mp3" type="audio/mpeg">

</audio>

<script>

window.addEventListener('load', () => {

    document.getElementById('player').play();

});

</script>

</body>
</html>
